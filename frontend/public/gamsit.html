<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Gamsit — Batu Gunting Kertas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Nunito:wght@500;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg-chalkboard: #22392f;
      --bg-chalkboard-deep: #1a2e26;
      --chalk-white: #f5f1e4;
      --paper-cream: #ece0c4;
      --accent-amber: #e8a33d;
      --accent-coral: #e2574c;
      --accent-slate: #7fa392;
      --line-soft: rgba(245, 241, 228, 0.28);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Nunito', system-ui, sans-serif;
      color: var(--chalk-white);
      background:
        radial-gradient(circle at 12% 18%, rgba(245,241,228,0.05) 0, transparent 40%),
        radial-gradient(circle at 82% 74%, rgba(245,241,228,0.045) 0, transparent 38%),
        radial-gradient(circle at 60% 10%, rgba(232,163,61,0.08) 0, transparent 45%),
        linear-gradient(160deg, var(--bg-chalkboard) 0%, var(--bg-chalkboard-deep) 100%);
      background-attachment: fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.75rem;
      position: relative;
      overflow-x: hidden;
    }
    /* drifting chalk dust */
    body::before, body::after {
      content: "";
      position: fixed;
      inset: -10%;
      pointer-events: none;
      background-image:
        radial-gradient(2px 2px at 10% 20%, rgba(245,241,228,0.35), transparent 60%),
        radial-gradient(1.5px 1.5px at 30% 60%, rgba(245,241,228,0.25), transparent 60%),
        radial-gradient(2px 2px at 70% 30%, rgba(245,241,228,0.3), transparent 60%),
        radial-gradient(1.5px 1.5px at 85% 80%, rgba(245,241,228,0.2), transparent 60%),
        radial-gradient(1.5px 1.5px at 50% 90%, rgba(245,241,228,0.22), transparent 60%);
      animation: dustDrift 26s ease-in-out infinite alternate;
      z-index: 0;
    }
    body::after { animation-duration: 34s; opacity: 0.6; transform: scale(1.2); }
    @keyframes dustDrift {
      from { transform: translate(0, 0); }
      to { transform: translate(2.5%, -3%); }
    }

    main.board {
      position: relative;
      z-index: 1;
      width: min(560px, 100%);
      background: rgba(245, 241, 228, 0.045);
      backdrop-filter: blur(2px);
      border-radius: 20px;
      padding: 2.1rem 2rem 1.75rem;
      border: 2px dashed var(--line-soft);
      box-shadow: 0 30px 70px rgba(0,0,0,0.4), inset 0 0 40px rgba(0,0,0,0.15);
      animation: panelEnter 0.6s cubic-bezier(.2,.8,.25,1) both;
    }
    @keyframes panelEnter {
      from { opacity: 0; transform: translateY(18px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .eyebrow {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent-slate);
      margin-bottom: 0.35rem;
    }
    h1 {
      margin: 0 0 0.4rem;
      font-family: 'Kalam', cursive;
      font-weight: 700;
      font-size: clamp(2.3rem, 6vw, 3rem);
      letter-spacing: 0.5px;
      position: relative;
      display: inline-block;
    }
    h1 svg.underline { display: block; width: 100%; height: 10px; margin-top: -4px; }
    p#description {
      margin: 0 0 1.1rem;
      color: rgba(245,241,228,0.75);
      line-height: 1.6;
      font-size: 0.98rem;
    }

    .mode-select {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.1rem;
      padding: 0.75rem 0.9rem;
      background: rgba(245,241,228,0.04);
      border: 1px dashed var(--line-soft);
      border-radius: 14px;
    }
    .mode-select .tally-label { margin-bottom: 0; }
    .mode-buttons { display: flex; gap: 0.4rem; }
    .mode-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 0.4rem 0.75rem;
      border-radius: 999px;
      border: 1px solid var(--line-soft);
      background: transparent;
      color: rgba(245,241,228,0.7);
    }
    .mode-btn.active {
      background: var(--accent-amber);
      border-color: var(--accent-amber);
      color: var(--bg-chalkboard-deep);
    }
    .mode-btn:hover:not(:disabled):not(.active) { border-color: var(--chalk-white); color: var(--chalk-white); transform: none; }
    .match-progress {
      width: 100%;
      margin-top: 0.35rem;
      font-size: 0.78rem;
      color: rgba(245,241,228,0.6);
      font-family: 'JetBrains Mono', monospace;
    }

    /* arena: hand vs hand */
    .arena {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.1rem;
      padding: 1rem 0.5rem;
      border-top: 1px dashed var(--line-soft);
      border-bottom: 1px dashed var(--line-soft);
    }
    .fighter { display: flex; flex-direction: column; align-items: center; gap: 0.4rem; }
    .hand {
      font-size: 2.6rem;
      line-height: 1;
      width: 4.2rem;
      height: 4.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(245,241,228,0.06);
      border: 2px dashed var(--line-soft);
      transition: transform 0.25s ease, border-color 0.25s ease, background 0.25s ease;
      transform-origin: center;
    }
    .fighter.opponent .hand { transform: scaleX(-1); }
    .hand.shaking { animation: handShake 0.32s ease-in-out infinite; }
    .fighter.opponent .hand.shaking { animation: handShakeFlip 0.32s ease-in-out infinite; }
    @keyframes handShake {
      0%, 100% { transform: rotate(-8deg) translateY(0); }
      50% { transform: rotate(8deg) translateY(-3px); }
    }
    @keyframes handShakeFlip {
      0%, 100% { transform: scaleX(-1) rotate(-8deg) translateY(0); }
      50% { transform: scaleX(-1) rotate(8deg) translateY(-3px); }
    }
    .hand.pop { animation: handPop 0.45s cubic-bezier(.3,1.6,.4,1) both; }
    @keyframes handPop {
      0% { transform: scale(0.6) rotate(-10deg); }
      60% { transform: scale(1.18) rotate(4deg); }
      100% { transform: scale(1) rotate(0); }
    }
    .fighter.opponent .hand.pop { animation-name: handPopFlip; }
    @keyframes handPopFlip {
      0% { transform: scaleX(-1) scale(0.6) rotate(10deg); }
      60% { transform: scaleX(-1) scale(1.18) rotate(-4deg); }
      100% { transform: scaleX(-1) scale(1) rotate(0); }
    }
    .fighter-label { font-size: 0.78rem; font-weight: 800; letter-spacing: 0.05em; color: rgba(245,241,228,0.7); text-transform: uppercase; }
    .vs-mark {
      font-family: 'Kalam', cursive;
      font-size: 1.15rem;
      color: var(--accent-amber);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 3.4rem;
    }
    #countdown {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.05em;
      color: var(--chalk-white);
      min-height: 1.1em;
      margin-bottom: 0.15rem;
    }

    #playAgainBtn {
      display: none;
      margin-top: 0.7rem;
      border-color: var(--accent-amber);
      color: var(--bg-chalkboard-deep);
      background: var(--accent-amber);
      font-weight: 800;
    }
    #playAgainBtn:hover:not(:disabled) { filter: brightness(1.08); transform: translateY(-2px); }

    .result {
      margin-bottom: 1.1rem;
      background: rgba(245,241,228,0.05);
      padding: 0.95rem 1.1rem;
      border-radius: 14px;
      border: 1px solid var(--line-soft);
      font-weight: 700;
      transition: border-color 0.3s ease, background 0.3s ease, transform 0.25s ease;
    }
    .result.is-win { border-color: var(--accent-amber); background: rgba(232,163,61,0.12); animation: resultPulse 0.5s ease; }
    .result.is-lose { border-color: var(--accent-coral); background: rgba(226,87,76,0.12); animation: resultShake 0.4s ease; }
    .result.is-draw { border-color: var(--accent-slate); background: rgba(127,163,146,0.12); }
    @keyframes resultPulse {
      0% { transform: scale(0.97); }
      50% { transform: scale(1.02); }
      100% { transform: scale(1); }
    }
    @keyframes resultShake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    .multiplayer { margin-bottom: 1.1rem; }
    .room-row { display: flex; flex-wrap: wrap; gap: 0.6rem; align-items: center; justify-content: space-between; }
    .room-row > div { display: flex; gap: 0.5rem; }
    #roomInput {
      font-family: 'JetBrains Mono', monospace;
      background: rgba(245,241,228,0.06);
      border: 1px dashed var(--line-soft);
      color: var(--chalk-white);
      border-radius: 999px;
      padding: 0.6rem 0.9rem;
      width: 9rem;
      outline-offset: 2px;
    }
    #roomInput::placeholder { color: rgba(245,241,228,0.4); }
    .room-info { margin-top: 0.6rem; font-size: 0.85rem; color: rgba(245,241,228,0.75); font-family: 'JetBrains Mono', monospace; }
    .room-link { margin-top: 0.35rem; font-size: 0.85rem; word-break: break-all; }
    .room-link a { color: var(--accent-amber); }
    .room-actions { display: none; }

    .buttons {
      display: grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: 0.85rem;
      margin-bottom: 1.15rem;
    }
    button {
      font-family: 'Nunito', sans-serif;
      border: 2px dashed var(--line-soft);
      border-radius: 16px;
      padding: 1rem 0.6rem;
      cursor: pointer;
      font-weight: 800;
      color: var(--chalk-white);
      background: rgba(245,241,228,0.05);
      transition: transform 0.18s ease, filter 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
    }
    button[data-choice="rock"]:hover:not(:disabled) { border-color: var(--chalk-white); background: rgba(245,241,228,0.12); transform: translateY(-3px) rotate(-2deg); }
    button[data-choice="paper"]:hover:not(:disabled) { border-color: var(--accent-amber); background: rgba(232,163,61,0.12); transform: translateY(-3px) rotate(2deg); }
    button[data-choice="scissors"]:hover:not(:disabled) { border-color: var(--accent-coral); background: rgba(226,87,76,0.12); transform: translateY(-3px) rotate(-2deg); }
    button:active:not(:disabled) { transform: translateY(0) scale(0.96); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button:focus-visible { outline: 2px solid var(--accent-amber); outline-offset: 3px; }
    button.reset {
      background: rgba(245,241,228,0.06);
      border-radius: 999px;
      padding: 0.6rem 1rem;
      font-weight: 700;
    }
    button.reset:hover:not(:disabled) { background: rgba(245,241,228,0.14); transform: translateY(-2px); }
    .icon { display: block; font-size: 1.6rem; }

    .scoreboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.85rem;
      margin-bottom: 0.6rem;
    }
    .tally {
      background: rgba(245,241,228,0.05);
      border: 1px dashed var(--line-soft);
      border-radius: 14px;
      padding: 0.7rem 0.85rem;
    }
    .tally-label {
      display: block;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(245,241,228,0.6);
      margin-bottom: 0.3rem;
    }
    .tally-marks { display: flex; flex-wrap: wrap; gap: 0.15rem; min-height: 1.6rem; align-items: center; }
    .tally-group { width: 34px; height: 24px; overflow: visible; }
    .tally-line { stroke: var(--chalk-white); stroke-width: 2.4; stroke-linecap: round; }
    .tally-slash { stroke: var(--accent-coral); stroke-width: 2.6; stroke-linecap: round; }
    .tally-zero { fill: rgba(245,241,228,0.35); }

    .nav { display: flex; justify-content: space-between; gap: 1rem; flex-wrap: wrap; margin-top: 0.9rem; align-items: center; }
    .nav a { color: var(--accent-amber); text-decoration: none; font-weight: 700; }
    .nav a:hover { text-decoration: underline; }

    @media (max-width: 420px) {
      main.board { padding: 1.5rem 1.25rem; }
      .hand { width: 3.4rem; height: 3.4rem; font-size: 2rem; }
      .icon { font-size: 1.3rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
    }
  </style>
</head>
<body>
  <svg width="0" height="0" style="position:absolute">
    <filter id="chalk-rough" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.6"/>
    </filter>
  </svg>

  <main class="board">
    <span class="eyebrow">Permainan Halaman</span>
    <h1>Gamsit
      <svg class="underline" viewBox="0 0 220 10" preserveAspectRatio="none">
        <path d="M2 6 Q 55 1, 110 6 T 218 5" fill="none" stroke="var(--accent-amber)" stroke-width="3" stroke-linecap="round" filter="url(#chalk-rough)"/>
      </svg>
    </h1>
    <p id="description">Pilih Batu, Gunting, atau Kertas ke lawan komputer. Siapa yang paling sering menang?</p>

    <div class="mode-select">
      <span class="tally-label">Mode Pertandingan</span>
      <div class="mode-buttons" id="modeButtons">
        <button type="button" class="mode-btn" data-bestof="1">Bo1</button>
        <button type="button" class="mode-btn active" data-bestof="3">Bo3</button>
        <button type="button" class="mode-btn" data-bestof="5">Bo5</button>
      </div>
      <div class="match-progress" id="matchProgress"></div>
    </div>

    <section class="arena">
      <div class="fighter you">
        <div class="hand" id="yourHand">✊</div>
        <span class="fighter-label">Kamu</span>
      </div>
      <div class="vs-mark">
        <span id="countdown"></span>
        VS
      </div>
      <div class="fighter opponent">
        <div class="hand" id="opponentHand">✊</div>
        <span class="fighter-label" id="opponentLabel">Komputer</span>
      </div>
    </section>

    <div class="result" id="result">Pilih satu pilihan di atas untuk mulai.</div>
    <button class="reset" id="playAgainBtn">🔁 Main Lagi</button>

    <div class="multiplayer" id="multiplayerPanel">
      <div class="room-row">
        <button class="reset" id="createRoomBtn">Buat room invite</button>
        <div>
          <input id="roomInput" type="text" placeholder="ID room" aria-label="Room ID" />
          <button class="reset" id="joinRoomBtn">Gabung room</button>
        </div>
      </div>
      <div class="room-info" id="roomInfo"></div>
      <div class="room-link" id="roomLink"></div>
      <div class="room-actions" id="roomActions" style="display:none; margin-top:0.75rem; gap:0.75rem;">
        <button class="reset" id="copyLinkBtn">Salin link undangan</button>
        <button class="reset" id="leaveRoomBtn">Keluar dari room</button>
      </div>
    </div>

    <div class="buttons">
      <button data-choice="rock"><span class="icon">✊</span>Batu</button>
      <button data-choice="scissors"><span class="icon">✌️</span>Gunting</button>
      <button data-choice="paper"><span class="icon">✋</span>Kertas</button>
    </div>

    <div class="scoreboard" id="score">
      <div class="tally">
        <span class="tally-label">Kamu</span>
        <div class="tally-marks" id="playerTally"></div>
      </div>
      <div class="tally">
        <span class="tally-label" id="opponentTallyLabel">Komputer</span>
        <div class="tally-marks" id="computerTally"></div>
      </div>
    </div>

    <div class="nav">
      <a href="/games.html">← Kembali ke daftar game</a>
      <button class="reset" id="resetBtn">Reset Skor</button>
    </div>
  </main>

  <script>
    const resultEl = document.getElementById('result');
    const resetBtn = document.getElementById('resetBtn');
    const createRoomBtn = document.getElementById('createRoomBtn');
    const joinRoomBtn = document.getElementById('joinRoomBtn');
    const roomInput = document.getElementById('roomInput');
    const roomInfo = document.getElementById('roomInfo');
    const roomLink = document.getElementById('roomLink');
    const copyLinkBtn = document.getElementById('copyLinkBtn');
    const leaveRoomBtn = document.getElementById('leaveRoomBtn');
    const roomActions = document.getElementById('roomActions');
    const descriptionEl = document.getElementById('description');
    const yourHandEl = document.getElementById('yourHand');
    const opponentHandEl = document.getElementById('opponentHand');
    const opponentLabelEl = document.getElementById('opponentLabel');
    const opponentTallyLabelEl = document.getElementById('opponentTallyLabel');
    const countdownEl = document.getElementById('countdown');
    const playerTallyEl = document.getElementById('playerTally');
    const computerTallyEl = document.getElementById('computerTally');
    const modeButtons = document.querySelectorAll('.mode-btn');
    const matchProgressEl = document.getElementById('matchProgress');
    const playAgainBtn = document.getElementById('playAgainBtn');

    const buttons = document.querySelectorAll('button[data-choice]');
    const options = ['rock','paper','scissors'];
    const labels = { rock: 'Batu', paper: 'Kertas', scissors: 'Gunting' };
    const emojis = { rock: '✊', paper: '✋', scissors: '✌️' };

    let playerScore = 0;
    let computerScore = 0;
    let currentRoomId = null;
    let playerId = null;
    let pollTimer = null;
    let activeMode = 'computer';
    let lastRoundKey = null;
    let lastKnownRoundKey = null;
    let isRevealing = false;
    let bestOf = 3;
    let winsNeeded = 2;
    let matchOver = false;

    const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

    function emojiFor(choice) {
      return emojis[choice] || '✊';
    }

    function setStatus(message, outcome) {
      resultEl.textContent = message;
      resultEl.classList.remove('is-win', 'is-lose', 'is-draw');
      if (outcome === 'win') resultEl.classList.add('is-win');
      else if (outcome === 'lose') resultEl.classList.add('is-lose');
      else if (outcome === 'draw') resultEl.classList.add('is-draw');
    }

    function makeTallyGroup(n) {
      const svgNS = 'http://www.w3.org/2000/svg';
      const svg = document.createElementNS(svgNS, 'svg');
      svg.setAttribute('viewBox', '0 0 40 30');
      svg.setAttribute('class', 'tally-group');
      const xs = [6, 14, 22, 30];
      const strokeCount = Math.min(n, 4);
      for (let i = 0; i < strokeCount; i++) {
        const line = document.createElementNS(svgNS, 'line');
        line.setAttribute('x1', xs[i]); line.setAttribute('y1', 4);
        line.setAttribute('x2', xs[i]); line.setAttribute('y2', 26);
        line.setAttribute('class', 'tally-line');
        line.setAttribute('filter', 'url(#chalk-rough)');
        svg.appendChild(line);
      }
      if (n === 5) {
        const slash = document.createElementNS(svgNS, 'line');
        slash.setAttribute('x1', 3); slash.setAttribute('y1', 26);
        slash.setAttribute('x2', 35); slash.setAttribute('y2', 3);
        slash.setAttribute('class', 'tally-slash');
        slash.setAttribute('filter', 'url(#chalk-rough)');
        svg.appendChild(slash);
      }
      if (n === 0) {
        const dot = document.createElementNS(svgNS, 'circle');
        dot.setAttribute('cx', 20); dot.setAttribute('cy', 15); dot.setAttribute('r', 2);
        dot.setAttribute('class', 'tally-zero');
        svg.appendChild(dot);
      }
      return svg;
    }

    function renderTally(container, count) {
      container.innerHTML = '';
      const full = Math.floor(count / 5);
      const remainder = count % 5;
      for (let i = 0; i < full; i++) container.appendChild(makeTallyGroup(5));
      if (remainder > 0) container.appendChild(makeTallyGroup(remainder));
      if (count === 0) container.appendChild(makeTallyGroup(0));
    }

    function setScore() {
      renderTally(playerTallyEl, playerScore);
      renderTally(computerTallyEl, computerScore);
    }

    function setBestOf(n) {
      bestOf = n;
      winsNeeded = Math.ceil(n / 2);
      modeButtons.forEach((b) => {
        b.classList.toggle('active', parseInt(b.dataset.bestof, 10) === n);
      });
      matchProgressEl.textContent = `Best of ${bestOf} • menang duluan sampai ${winsNeeded} ronde`;
      resetMatch();
    }

    function resetMatch() {
      playerScore = 0;
      computerScore = 0;
      matchOver = false;
      lastRoundKey = lastKnownRoundKey;
      setScore();
      playAgainBtn.style.display = 'none';
      countdownEl.textContent = '';
      yourHandEl.textContent = '✊';
      opponentHandEl.textContent = '✊';
      buttons.forEach((b) => { b.disabled = false; });
      if (activeMode === 'computer') {
        setStatus('Pilih satu pilihan di atas untuk mulai.', null);
      } else {
        setStatus('Pilih Batu, Gunting, atau Kertas untuk ronde baru.', null);
      }
    }

    function checkMatchOver() {
      if (matchOver) return true;
      if (playerScore >= winsNeeded || computerScore >= winsNeeded) {
        matchOver = true;
        return true;
      }
      return false;
    }

    // Returns true if the match just ended, false if the match continues.
    function finalizeRound() {
      if (!checkMatchOver()) return false;
      const wonMatch = playerScore >= winsNeeded;
      const opponentName = activeMode === 'computer' ? 'Komputer' : 'Lawan';
      const banner = wonMatch
        ? `🏆 Kamu memenangkan pertandingan Best of ${bestOf}!`
        : `💀 ${opponentName} memenangkan pertandingan Best of ${bestOf}.`;
      resultEl.textContent = `${resultEl.textContent} ${banner}`;
      resultEl.classList.remove('is-win', 'is-lose', 'is-draw');
      resultEl.classList.add(wonMatch ? 'is-win' : 'is-lose');
      buttons.forEach((b) => { b.disabled = true; });
      playAgainBtn.style.display = 'inline-flex';
      return true;
    }

    async function parseJsonResponse(response) {
      const text = await response.text();
      try {
        return JSON.parse(text);
      } catch {
        const message = text.trim() || response.statusText || 'Invalid response';
        throw new Error(`Server error ${response.status}: ${message}`);
      }
    }

    async function animateReveal(yourChoice, opponentChoice) {
      yourHandEl.classList.add('shaking');
      opponentHandEl.classList.add('shaking');
      const beats = ['Suit...', 'Suit...', 'Jalan!'];
      for (let i = 0; i < beats.length; i++) {
        countdownEl.textContent = beats[i];
        yourHandEl.textContent = emojis[options[i % 3]];
        opponentHandEl.textContent = emojis[options[(i + 1) % 3]];
        await sleep(300);
      }
      yourHandEl.classList.remove('shaking');
      opponentHandEl.classList.remove('shaking');
      countdownEl.textContent = '';
      yourHandEl.textContent = emojiFor(yourChoice);
      opponentHandEl.textContent = emojiFor(opponentChoice);
      yourHandEl.classList.add('pop');
      opponentHandEl.classList.add('pop');
      await sleep(450);
      yourHandEl.classList.remove('pop');
      opponentHandEl.classList.remove('pop');
    }

    function updateGameButtons(state) {
      if (activeMode === 'computer') {
        buttons.forEach((btn) => { btn.disabled = false; });
        return;
      }
      if (matchOver || isRevealing) {
        buttons.forEach((btn) => { btn.disabled = true; });
        return;
      }
      const enabled = !!(state && (
        state.status === 'ready' ||
        (state.status === 'finished' && lastRoundKey === lastKnownRoundKey)
      ));
      buttons.forEach((btn) => { btn.disabled = !enabled; });
    }

    async function playComputer(choice) {
      buttons.forEach((b) => { b.disabled = true; });
      const computerChoice = options[Math.floor(Math.random() * options.length)];
      await animateReveal(choice, computerChoice);
      let message = `Kamu memilih ${labels[choice]}, komputer memilih ${labels[computerChoice]}. `;
      let outcome = 'draw';
      if (choice === computerChoice) {
        message += 'Hasilnya seri!';
      } else if (
        (choice === 'rock' && computerChoice === 'scissors') ||
        (choice === 'paper' && computerChoice === 'rock') ||
        (choice === 'scissors' && computerChoice === 'paper')
      ) {
        message += 'Kamu menang!';
        playerScore += 1;
        outcome = 'win';
      } else {
        message += 'Kamu kalah.';
        computerScore += 1;
        outcome = 'lose';
      }
      setStatus(message, outcome);
      setScore();
      const matchEnded = finalizeRound();
      if (!matchEnded) {
        buttons.forEach((b) => { b.disabled = false; });
      }
    }

    async function createRoom() {
      try {
        const response = await fetch('/api/gamsit/create-room', { method: 'POST' });
        const data = await parseJsonResponse(response);
        if (!response.ok) throw new Error(data.error || 'Gagal membuat room');
        savePlayerId(data.roomId, data.playerId);
        setRoomState(data);
        startPolling();
      } catch (error) {
        setStatus(error.message || 'Gagal membuat room', null);
      }
    }

    async function joinRoom(roomId) {
      try {
        const storedPlayerId = loadPlayerId(roomId);
        const response = await fetch(`/api/gamsit/room/${encodeURIComponent(roomId)}/join`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ playerId: storedPlayerId }),
        });
        const data = await parseJsonResponse(response);
        if (!response.ok) throw new Error(data.error || 'Gagal bergabung room');
        savePlayerId(roomId, data.playerId);
        setRoomState(data);
        startPolling();
      } catch (error) {
        setStatus(error.message || 'Gagal bergabung room', null);
      }
    }

    function savePlayerId(roomId, id) {
      if (!roomId || !id) return;
      localStorage.setItem(`gamsit-player-${roomId}`, id);
      playerId = id;
    }

    function loadPlayerId(roomId) {
      return roomId ? localStorage.getItem(`gamsit-player-${roomId}`) : null;
    }

    function clearPlayerId(roomId) {
      if (!roomId) return;
      localStorage.removeItem(`gamsit-player-${roomId}`);
    }

    function getRoomIdFromQuery() {
      return new URLSearchParams(window.location.search).get('room');
    }

    async function fetchRoomState() {
      if (!currentRoomId || !playerId) return;
      try {
        const response = await fetch(`/api/gamsit/room/${encodeURIComponent(currentRoomId)}?playerId=${encodeURIComponent(playerId)}`);
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Gagal mengambil status room');
        setRoomState(data);
      } catch (error) {
        setStatus(error.message || 'Gagal mengambil status room', null);
      }
    }

    function setRoomState(state) {
      if (!state) return;
      currentRoomId = state.roomId;
      playerId = state.playerId || playerId;
      roomInput.value = state.roomId;
      roomInfo.innerHTML = `Room ID: <strong>${state.roomId}</strong> • Pemain: ${state.playerCount}/2`;
      if (state.roomUrl) {
        roomLink.innerHTML = `Undang lawan dengan link: <a href="${state.roomUrl}">${state.roomUrl}</a>`;
        roomActions.style.display = 'flex';
      }
      opponentLabelEl.textContent = 'Lawan';
      opponentTallyLabelEl.textContent = 'Lawan';

      if (state.status === 'waiting') {
        setStatus('Room dibuat. Tunggu lawan bergabung...', null);
        yourHandEl.textContent = '✊';
        opponentHandEl.textContent = '❔';
      } else if (state.status === 'ready') {
        setStatus('Lawan sudah bergabung. Pilih Batu, Gunting, atau Kertas.', null);
        yourHandEl.textContent = '✊';
        opponentHandEl.textContent = '✊';
      } else if (state.status === 'finished') {
        const myChoice = state.yourChoice || null;
        const opponentChoice = state.opponentChoice || null;
        const myLabel = myChoice ? labels[myChoice] : 'Menunggu';
        const oppLabel = opponentChoice ? labels[opponentChoice] : 'Menunggu';
        let message = `Kamu memilih ${myLabel}, lawan memilih ${oppLabel}. `;
        let outcome = 'draw';
        if (state.result === 'win') { message += 'Kamu menang!'; outcome = 'win'; }
        else if (state.result === 'lose') { message += 'Kamu kalah.'; outcome = 'lose'; }
        else message += 'Hasilnya seri!';

        const key = `${state.roomId}-${myChoice}-${opponentChoice}`;
        if (myChoice && opponentChoice) lastKnownRoundKey = key;
        const isNewRound = !!(myChoice && opponentChoice && key !== lastRoundKey && !matchOver);
        if (isNewRound) {
          lastRoundKey = key;
          isRevealing = true;
          if (outcome === 'win') playerScore += 1;
          else if (outcome === 'lose') computerScore += 1;
          setScore();
          animateReveal(myChoice, opponentChoice).then(() => {
            setStatus(message, outcome);
            isRevealing = false;
            finalizeRound();
            updateGameButtons(state);
          });
        } else if (!matchOver) {
          yourHandEl.textContent = myChoice ? emojiFor(myChoice) : '✊';
          opponentHandEl.textContent = opponentChoice ? emojiFor(opponentChoice) : '✊';
          setStatus(message, outcome);
        }
        // If matchOver is already true, leave the match-result banner and hands untouched
        // until the person presses "Main Lagi" — a stray poll shouldn't overwrite it.
      }
      updateGameButtons(state);
      activeMode = 'multiplayer';
      descriptionEl.textContent = 'Bermain dengan teman melalui invite link.';
    }

    async function sendChoice(choice) {
      if (activeMode === 'computer') {
        await playComputer(choice);
        return;
      }

      if (!currentRoomId || !playerId) {
        setStatus('Gabung room dulu sebelum memilih.', null);
        return;
      }

      try {
        buttons.forEach((b) => { b.disabled = true; });
        yourHandEl.textContent = emojiFor(choice);
        yourHandEl.classList.add('pop');
        setStatus('Menunggu pilihan lawan...', null);
        const response = await fetch(`/api/gamsit/room/${encodeURIComponent(currentRoomId)}/choice`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ playerId, choice }),
        });
        const data = await parseJsonResponse(response);
        if (!response.ok) throw new Error(data.error || 'Gagal mengirim pilihan');
        setRoomState(data);
      } catch (error) {
        setStatus(error.message || 'Gagal mengirim pilihan', null);
        updateGameButtons({ status: 'ready' });
      }
    }

    function startPolling() {
      stopPolling();
      pollTimer = setInterval(fetchRoomState, 2000);
    }

    function stopPolling() {
      if (pollTimer) {
        clearInterval(pollTimer);
        pollTimer = null;
      }
    }

    function leaveRoom() {
      if (currentRoomId) {
        clearPlayerId(currentRoomId);
      }
      currentRoomId = null;
      playerId = null;
      lastRoundKey = null;
      lastKnownRoundKey = null;
      isRevealing = false;
      roomInput.value = '';
      roomInfo.textContent = '';
      roomLink.textContent = '';
      roomActions.style.display = 'none';
      activeMode = 'computer';
      opponentLabelEl.textContent = 'Komputer';
      opponentTallyLabelEl.textContent = 'Komputer';
      descriptionEl.textContent = 'Pilih Batu, Gunting, atau Kertas ke lawan komputer. Siapa yang paling sering menang?';
      resetMatch();
      updateGameButtons({ status: 'computer' });
      stopPolling();
    }

    copyLinkBtn.addEventListener('click', () => {
      const link = roomLink.querySelector('a');
      if (!link) return;
      navigator.clipboard.writeText(link.href).then(() => {
        setStatus('Link undangan disalin ke clipboard.', null);
      }).catch(() => {
        setStatus('Tidak dapat menyalin link. Silakan salin manual.', null);
      });
    });

    createRoomBtn.addEventListener('click', createRoom);
    joinRoomBtn.addEventListener('click', () => {
      const roomId = roomInput.value.trim();
      if (!roomId) {
        setStatus('Masukkan ID room untuk bergabung.', null);
        return;
      }
      joinRoom(roomId);
    });
    leaveRoomBtn.addEventListener('click', leaveRoom);

    buttons.forEach((btn) => btn.addEventListener('click', () => sendChoice(btn.dataset.choice)));
    resetBtn.addEventListener('click', () => {
      resetMatch();
    });
    playAgainBtn.addEventListener('click', () => {
      resetMatch();
    });
    modeButtons.forEach((btn) => {
      btn.addEventListener('click', () => {
        setBestOf(parseInt(btn.dataset.bestof, 10));
      });
    });

    setBestOf(bestOf);

    const initialRoomId = getRoomIdFromQuery();
    if (initialRoomId) {
      roomInput.value = initialRoomId;
      joinRoom(initialRoomId);
    }
  </script>
</body>
</html>
