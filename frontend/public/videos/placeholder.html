<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Placeholder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100%;
            height: 100vh;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
        }
        
        .video-placeholder {
            width: 100%;
            max-width: 1080px;
            aspect-ratio: 9 / 16;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 2rem;
        }
        
        .video-placeholder h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .video-placeholder p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        
        .video-placeholder ul {
            text-align: left;
            list-style: none;
            margin-top: 2rem;
        }
        
        .video-placeholder li {
            padding: 0.5rem 0;
            opacity: 0.8;
        }
        
        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="video-placeholder">
        <div class="icon">🎥</div>
        <h1>Video Placeholder</h1>
        <p>Tempat untuk video kalian berdua</p>
        
        <ul>
            <li>✓ Simpan video di: public/videos/couple.webm</li>
            <li>✓ Format: MP4 atau WebM</li>
            <li>✓ Aspect Ratio: 9:16 (Portrait)</li>
            <li>✓ Resolution: 1080x1920px</li>
        </ul>
        
        <p style="margin-top: 3rem; font-size: 1rem;">Lihat README.md untuk instruksi lengkap</p>
    </div>
</body>
</html>
