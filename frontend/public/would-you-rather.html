<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Would You Rather</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: system-ui,Segoe UI,Roboto,Arial,sans-serif; background: linear-gradient(180deg,#0f172a 0%,#111827 100%); color: #f8fafc; display:flex; align-items:center; justify-content:center; padding:1.5rem; }
    .card { width:min(540px,100%); background: rgba(255,255,255,0.08); border:1px solid rgba(148,163,184,0.15); border-radius:24px; padding:2rem; box-shadow:0 30px 80px rgba(15,23,42,.45); }
    h1 { margin:0 0 0.75rem; font-size:clamp(2rem,4vw,2.6rem); }
    .prompt { margin:1.5rem 0; font-size:1.05rem; line-height:1.7; color:#e2e8f0; }
    .choices { display:grid; gap:0.85rem; }
    button { border:none; border-radius:999px; padding:1rem 1.1rem; cursor:pointer; font-weight:700; color:#0f172a; background: #f8fafc; transition: transform .15s ease, filter .15s ease; }
    button:hover { transform: translateY(-2px); filter: brightness(0.98); }
    button.secondary { background: rgba(99,102,241,.95); color:#fff; }
    .meta { display:flex; justify-content:space-between; align-items:center; gap:1rem; flex-wrap:wrap; margin-top:1.25rem; }
    .meta a { color:#93c5fd; text-decoration:none; }
  </style>
</head>
<body>
  <article class="card">
    <h1>Would You Rather</h1>
    <p class="prompt" id="promptText">Muat pertanyaan...</p>
    <div class="choices">
      <button id="optionA">Pilihan A</button>
      <button id="optionB">Pilihan B</button>
    </div>
    <div class="meta">
      <button id="nextBtn" class="secondary">Pertanyaan Baru</button>
      <a href="/games.html">← Kembali ke daftar game</a>
    </div>
  </article>
  <script>
    const promptText = document.getElementById('promptText');
    const optionA = document.getElementById('optionA');
    const optionB = document.getElementById('optionB');
    const nextBtn = document.getElementById('nextBtn');
    const questions = [
      { a: 'Makan nasi goreng setiap hari', b: 'Makan mie instan setiap hari' },
      { a: 'Liburan pantai', b: 'Liburan pegunungan' },
      { a: 'Punya kucing peliharaan', b: 'Punya anjing peliharaan' },
      { a: 'Nonton film horor', b: 'Nonton film komedi' },
      { a: 'Bangun pagi setiap hari', b: 'Begadang dan bangun siang' },
      { a: 'Makan dessert duluan sebelum makan utama', b: 'Makan dessert terakhir' },
      { a: 'Selalu chat duluan', b: 'Selalu tunggu dia chat duluan' },
      { a: 'Nonton konser bareng', b: 'Liburan santai bareng' },
      { a: 'Punya kado kejutan setiap bulan', b: 'Kado besar di momen spesial saja' },
      { a: 'Pilih kencan ke kafe estetik', b: 'Pilih kencan ke taman kota' },
    ];
    function loadQuestion() {
      const next = questions[Math.floor(Math.random() * questions.length)];
      promptText.textContent = `Would you rather: ${next.a} atau ${next.b}?`;
      optionA.textContent = next.a;
      optionB.textContent = next.b;
    }
    function choose(option) {
      promptText.textContent = `Kamu memilih: ${option}. Siap untuk pertanyaan berikutnya?`;
    }
    optionA.addEventListener('click', () => choose(optionA.textContent));
    optionB.addEventListener('click', () => choose(optionB.textContent));
    nextBtn.addEventListener('click', loadQuestion);
    loadQuestion();
  </script>
</body>
</html>
