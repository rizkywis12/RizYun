<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Gallery - RizYun</title>
    <style>
      body{background:#0f0f10;color:#fff;font-family:system-ui,Segoe UI,Roboto,Arial;margin:0;padding:2rem}
      .wrap{max-width:1100px;margin:0 auto}
      .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem}
      .album{background:rgba(255,255,255,0.02);padding:1rem;border-radius:10px}
      .thumb{height:260px;border-radius:8px;background:linear-gradient(135deg,#222,#111);display:flex;align-items:center;justify-content:center;font-size:3rem}
      a{color:#ff4081}
      header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>Gallery</h1>
        <p><a href="/">Back to Home</a></p>
      </header>

      <div id="content" class="grid">
        <p id="loading">Loading album...</p>
      </div>
    </div>

    <script>
      function qs(name) {
        const u = new URL(window.location.href);
        return u.searchParams.get(name);
      }
      const album = qs('album');
      const content = document.getElementById('content');
      const loading = document.getElementById('loading');

      async function loadAlbum(name) {
        try {
          const res = await fetch(`/api/albums/${encodeURIComponent(name)}`);
          const data = await res.json();
          const items = data.items || [];
          content.innerHTML = '';
          if (items.length === 0) {
            content.innerHTML = '<p>No photos found in this album.</p>';
            return;
          }
          items.forEach(it => {
            const sec = document.createElement('section');
            sec.className = 'album';
            sec.innerHTML = `<div class="thumb"><img src="${it.url}" style="width:100%;height:100%;object-fit:cover;border-radius:6px"/></div><h3>${it.key.split('/').pop()}</h3><p>${Math.round(it.size/1024)} KB</p>`;
            content.appendChild(sec);
          });
        } catch (e) {
          console.error(e);
          content.innerHTML = '<p>Failed to load album.</p>';
        }
      }

      if (album) {
        loadAlbum(album);
      } else {
        content.innerHTML = '<p>No album specified. Use <code>?album=FolderName</code></p>';
      }
    </script>
    </div>
  </body>
</html>
