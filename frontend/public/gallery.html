<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Gallery - RizYun</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body{background:#07080e;color:#fff;font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;margin:0;padding:1.5rem}
      .wrap{max-width:1100px;margin:0 auto}
      header{display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;margin-bottom:1.25rem}
      header h1{margin:0;font-size:clamp(2rem,3vw,2.8rem);}
      header p{margin:0;font-size:0.95rem;}
      header a{color:#8be4ff;text-decoration:none;}
      .status-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:1.25rem;margin-bottom:1.5rem;}
      .status-card h2{margin:0 0 0.35rem;font-size:1.3rem;}
      .status-card p{margin:0;color:#9aa2b2;}
      .upload-panel{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;}
      .panel{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:1.25rem;}
      .panel h3{margin-top:0;margin-bottom:0.75rem;font-size:1.05rem;}
      .panel label{display:block;margin-bottom:0.75rem;font-size:0.95rem;color:#cbd6f5;}
      .panel input[type=file]{width:100%;color:#fff;}
      .panel button{border:none;padding:0.85rem 1rem;border-radius:999px;background:linear-gradient(135deg,#7c5cff,#4d88ff);color:#fff;cursor:pointer;font-weight:600;transition:.2s ease;}
      .panel button:hover{transform:translateY(-1px);}
      .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem}
      .album-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;overflow:hidden;}
      .thumb{min-height:220px;background:linear-gradient(135deg,#151722,#0a0b10);display:flex;align-items:center;justify-content:center;font-size:3rem;overflow:hidden;}
      .thumb img{width:100%;height:100%;object-fit:cover;display:block;}
      .album-card h3{margin:1rem 1rem 0.45rem;font-size:1.05rem;}
      .album-card p{margin:0 1rem 1rem;color:#9aa2b2;font-size:0.95rem;}
      .flash{margin-top:1rem;color:#8bffa1;font-weight:600;}
      .error{margin-top:1rem;color:#ff7a7a;font-weight:600;}
      .empty-state{padding:1.5rem;background:rgba(255,255,255,0.03);border:1px dashed rgba(255,255,255,0.14);border-radius:20px;text-align:center;color:#b0b7c6;}
      .upload-form{display:flex;align-items:flex-end;gap:0.75rem;flex-wrap:wrap;}
      .note{margin-top:0.75rem;font-size:0.9rem;color:#8d99b1;}
      @media (max-width: 720px){.upload-panel{grid-template-columns:1fr;}}
      @media (max-width: 560px){.album-card{border-radius:18px;}}
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>Album Viewer</h1>
        <p><a href="/">Back to Home</a></p>
      </header>

      <section class="status-card">
        <h2 id="albumTitle">Loading album...</h2>
        <p id="albumInfo">Please wait while we load the album contents.</p>
      </section>

      <div class="upload-panel">
        <section class="panel">
          <h3>Set Album Thumbnail</h3>
          <form id="thumbnailForm" class="upload-form" onsubmit="return false;">
            <label for="thumbnailInput">Upload file named <strong>thumbnail</strong></label>
            <input id="thumbnailInput" type="file" accept="image/*" />
            <button id="thumbnailUploadBtn" type="button">Upload Thumbnail</button>
          </form>
          <p class="note">The thumbnail file will be stored as <code>thumbnail</code> inside the album and used as cover image.</p>
          <p id="thumbnailMessage" class="flash" style="display:none"></p>
        </section>
        <section class="panel">
          <h3>Upload Photo to Album</h3>
          <form id="photoForm" class="upload-form" onsubmit="return false;">
            <label for="photoInput">Upload any image file to add to album</label>
            <input id="photoInput" type="file" accept="image/*" />
            <button id="photoUploadBtn" type="button">Upload Photo</button>
          </form>
          <p class="note">Uploaded files are stored with a timestamp prefix so they remain unique.</p>
          <p id="photoMessage" class="flash" style="display:none"></p>
        </section>
      </div>

      <div id="content" class="grid"></div>
    </div>

    <script>
      function qs(name) {
        const u = new URL(window.location.href);
        return u.searchParams.get(name);
      }

      const album = qs('album');
      const API_ROOT = (window.location && window.location.origin && window.location.origin.startsWith('http')) ? '' : 'http://localhost:3000';
      const content = document.getElementById('content');
      const albumTitle = document.getElementById('albumTitle');
      const albumInfo = document.getElementById('albumInfo');
      const thumbnailInput = document.getElementById('thumbnailInput');
      const thumbnailUploadBtn = document.getElementById('thumbnailUploadBtn');
      const photoInput = document.getElementById('photoInput');
      const photoUploadBtn = document.getElementById('photoUploadBtn');
      const thumbnailMessage = document.getElementById('thumbnailMessage');
      const photoMessage = document.getElementById('photoMessage');

      function showMessage(el, text, isError = false) {
        el.style.display = 'block';
        el.textContent = text;
        el.style.color = isError ? '#ff7a7a' : '#8bffa1';
      }

      async function loadAlbum(name) {
        try {
          albumTitle.textContent = name;
          const res = await fetch(`${API_ROOT}/api/albums/${encodeURIComponent(name)}`);
          if (!res.ok) throw new Error(`Failed to load album ${res.status}`);
          const data = await res.json();
          const items = data.items || [];
          const thumbnailItem = items.find(i => i.key.endsWith('/thumbnail'));
          const photoItems = items.filter(i => !i.key.endsWith('/thumbnail'));

          content.innerHTML = '';
          albumInfo.textContent = `${photoItems.length} photo(s) in this album.`;

          if (thumbnailItem) {
            const thumbCard = document.createElement('section');
            thumbCard.className = 'album-card';
            thumbCard.innerHTML = `<div class="thumb"><img src="${thumbnailItem.url}" alt="Album thumbnail"/></div><h3>Album Thumbnail</h3><p>Filename: thumbnail</p>`;
            content.appendChild(thumbCard);
          }

          const visiblePhotos = photoItems.filter(i => !i.key.endsWith('/.keep'));
          if (visiblePhotos.length === 0) {
            const emptyCard = document.createElement('section');
            emptyCard.className = 'album-card empty-state';
            emptyCard.innerHTML = '<p>No photos uploaded yet. Use the upload panel above to add album photos and a thumbnail.</p>';
            content.appendChild(emptyCard);
            return;
          }

          visiblePhotos.forEach(it => {
            const fileName = it.key.split('/').pop();
            const sizeKb = Math.round(it.size / 1024);
            const sec = document.createElement('section');
            sec.className = 'album-card';
            sec.innerHTML = `<div class="thumb"><img src="${it.url}" alt="${fileName}"/></div><h3>${fileName}</h3><p>${sizeKb} KB</p>`;
            content.appendChild(sec);
          });

          photoItems.forEach(it => {
            const fileName = it.key.split('/').pop();
            const sizeKb = Math.round(it.size / 1024);
            const sec = document.createElement('section');
            sec.className = 'album-card';
            sec.innerHTML = `<div class="thumb"><img src="${it.url}" alt="${fileName}"/></div><h3>${fileName}</h3><p>${sizeKb} KB</p>`;
            content.appendChild(sec);
          });
        } catch (e) {
          console.error(e);
          albumTitle.textContent = 'Album not found';
          albumInfo.textContent = '';
          content.innerHTML = '<section class="album-card empty-state"><p>Failed to load album. Make sure the album name is correct.</p></section>';
        }
      }

      async function uploadFile(endpoint, fieldName, fileInput, messageEl, successText) {
        const file = fileInput.files[0];
        if (!file) {
          showMessage(messageEl, 'Please select a file first.', true);
          return;
        }
        const form = new FormData();
        form.append(fieldName, file, fieldName === 'thumbnail' ? 'thumbnail' : file.name);
        try {
          const res = await fetch(`${API_ROOT}${endpoint}`, { method: 'POST', body: form });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || `Upload failed ${res.status}`);
          showMessage(messageEl, successText);
          fileInput.value = '';
          await loadAlbum(album);
        } catch (err) {
          console.error(err);
          showMessage(err.message || 'Upload failed', true);
        }
      }

      if (album) {
        loadAlbum(album);
      } else {
        albumTitle.textContent = 'No album specified';
        albumInfo.textContent = 'Use ?album=FolderName in the URL to load an album.';
        content.innerHTML = '<section class="album-card empty-state"><p>Please specify an album name in the URL.</p></section>';
      }

      thumbnailUploadBtn.addEventListener('click', () => {
        uploadFile(`/api/albums/${encodeURIComponent(album)}/thumbnail`, 'thumbnail', thumbnailInput, thumbnailMessage, 'Thumbnail uploaded successfully.');
      });

      photoUploadBtn.addEventListener('click', () => {
        uploadFile(`/api/albums/${encodeURIComponent(album)}/photos`, 'file', photoInput, photoMessage, 'Photo uploaded successfully.');
      });
    </script>
  </body>
</html>
